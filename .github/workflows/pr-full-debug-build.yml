name: PR Full Debug Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-full-debug-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full-debug-build:
    name: Build fullDebug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare local properties
        env:
          LOCAL_PROPERTIES_BASE64: ${{ secrets.LOCAL_PROPERTIES_BASE64 }}
          LOCAL_DEV_PROPERTIES_BASE64: ${{ secrets.LOCAL_DEV_PROPERTIES_BASE64 }}
        run: |
          if [ -n "$LOCAL_PROPERTIES_BASE64" ]; then
            printf '%s' "$LOCAL_PROPERTIES_BASE64" | base64 --decode > local.properties
          else
            touch local.properties
          fi

          if [ -n "$LOCAL_DEV_PROPERTIES_BASE64" ]; then
            printf '%s' "$LOCAL_DEV_PROPERTIES_BASE64" | base64 --decode > local.dev.properties
          else
            touch local.dev.properties
          fi

      - name: Prepare CI signing config
        run: |
          keytool -genkeypair \
            -v \
            -keystore "$RUNNER_TEMP/ci-debug.jks" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

          {
            echo "NUVIO_RELEASE_STORE_FILE=$RUNNER_TEMP/ci-debug.jks"
            echo "NUVIO_RELEASE_KEY_ALIAS=androiddebugkey"
            echo "NUVIO_RELEASE_KEY_PASSWORD=android"
            echo "NUVIO_RELEASE_STORE_PASSWORD=android"
          } >> "$GITHUB_ENV"

      - name: Build fullDebug APK
        run: ./gradlew :app:assembleFullDebug --stacktrace

      - name: Upload fullDebug APK
        uses: actions/upload-artifact@v4
        with:
          name: nuvio-full-debug-pr-${{ github.event.pull_request.number || github.run_number }}
          path: app/build/outputs/apk/full/debug/app-full-universal-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Comment PR with build link
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- nuvio-full-debug-build -->";
            const artifactName = `nuvio-full-debug-pr-${context.payload.pull_request.number}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              "Full debug APK build completed successfully.",
              "",
              `Artifact: \`${artifactName}\``,
              `Download: ${runUrl}`,
              "",
              "Open the workflow run and download the APK from the Artifacts section."
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }

      - name: Comment PR with failure link
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- nuvio-full-debug-build -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              "Full debug APK build failed.",
              "",
              `Logs: ${runUrl}`,
              "",
              "Open the failed workflow run and expand the failed step to see the Gradle error."
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body
              });
            }
