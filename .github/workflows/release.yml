name: Release

# Production release. Triggered by pushing a tag like v1.2.3 (or run manually with a version).
# Builds the SIGNED release APK + AAB and publishes them to a GitHub Release.
#
# Required repo secrets (set once — see the release notes):
#   RELEASE_KEYSTORE_BASE64   base64 of your release keystore (.jks)
#   RELEASE_STORE_PASSWORD    keystore password
#   RELEASE_KEY_ALIAS         key alias
#   RELEASE_KEY_PASSWORD      key password
#   SUPABASE_URL / SUPABASE_ANON_KEY   (optional) bake login into the release
#
# Play Store upload AAB (playstore flavor) signs with a SEPARATE dedicated key —
# the GitHub-release key must never change (the in-app updater needs signature
# continuity), while the Play upload key is rotatable via Play App Signing:
#   PLAY_UPLOAD_KEYSTORE_BASE64 / PLAY_UPLOAD_STORE_PASSWORD
#   PLAY_UPLOAD_KEY_ALIAS / PLAY_UPLOAD_KEY_PASSWORD
#
# The playstore AAB is then published to Google Play automatically via the Play
# Developer API (service account json in PLAY_SERVICE_ACCOUNT_JSON). A tag push
# publishes to `internal`; pick another track on a manual run to promote further.
# Production uploads stay blocked by Google until the closed-test requirement is
# met and production access is granted — the pipeline is ready for that day.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 1.2.3 (creates tag v<version>)'
        required: true
      play_track:
        description: 'Google Play track to publish the AAB to'
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle (deps + build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Decode signing keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.jks"

      - name: Configure local.properties
        run: |
          {
            echo "NUVIO_RELEASE_STORE_FILE=$GITHUB_WORKSPACE/release.jks"
            echo "NUVIO_RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}"
            echo "NUVIO_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}"
            echo "NUVIO_RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}"
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}"
          } >> local.properties

      - name: Raise Gradle heap
        run: printf '\norg.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8\n' >> gradle.properties

      - name: Build signed release APK + AAB
        env:
          NUVIO_RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          NUVIO_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          NUVIO_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          NUVIO_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleFullRelease :app:bundleFullRelease \
            -PversionNameOverride="${{ steps.ver.outputs.version }}" \
            -PversionCodeOverride="${{ github.run_number }}" --stacktrace

      - name: Decode Play upload keystore
        run: echo "${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/play-upload.jks"

      - name: Build Play Store AAB (playstore flavor, dedicated upload key)
        env:
          NUVIO_RELEASE_STORE_FILE: ${{ github.workspace }}/play-upload.jks
          NUVIO_RELEASE_STORE_PASSWORD: ${{ secrets.PLAY_UPLOAD_STORE_PASSWORD }}
          NUVIO_RELEASE_KEY_ALIAS: ${{ secrets.PLAY_UPLOAD_KEY_ALIAS }}
          NUVIO_RELEASE_KEY_PASSWORD: ${{ secrets.PLAY_UPLOAD_KEY_PASSWORD }}
        run: |
          ./gradlew :app:bundlePlaystoreRelease \
            -PversionNameOverride="${{ steps.ver.outputs.version }}" \
            -PversionCodeOverride="${{ github.run_number }}" --stacktrace

      - name: Publish AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.tuvora.tv
          releaseFiles: app/build/outputs/bundle/playstoreRelease/*.aab
          # Tag push -> internal (safe); manual run can choose alpha/beta/production.
          track: ${{ github.event.inputs.play_track || 'internal' }}
          status: completed

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp "$(find app/build/outputs/apk/full/release -name '*.apk' | head -1)" "dist/Tuvora-TV-${{ steps.ver.outputs.version }}.apk"
          cp "$(find app/build/outputs/bundle/fullRelease -name '*.aab' | head -1)" "dist/Tuvora-TV-${{ steps.ver.outputs.version }}.aab"
          cp "$(find app/build/outputs/bundle/playstoreRelease -name '*.aab' | head -1)" "dist/Tuvora-TV-${{ steps.ver.outputs.version }}-playstore.aab"
          ls -la dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" dist/* \
            --title "Tuvora TV ${{ steps.ver.outputs.version }}" \
            --generate-notes || \
          gh release upload "${{ steps.ver.outputs.tag }}" dist/* --clobber

      # Community announcements — no-ops until the DISCORD_/TELEGRAM_ secrets exist.
      # Never fails the release (all curl errors are swallowed).
      - name: Announce release (Discord + Telegram)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          MSG=$(printf '%s\n' \
            "Tuvora TV ${VERSION} is out! 🎉" \
            "" \
            "⬇️ APK: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}" \
            "🏪 Play beta: join https://groups.google.com/g/tuvora-testers then https://play.google.com/apps/testing/com.tuvora.tv" \
            "📖 Guides: https://paradox-kush.github.io/tuvora-site/guides.html")
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            jq -n --arg c "$MSG" '{content: $c}' | \
              curl -fsS -H 'Content-Type: application/json' -d @- "$DISCORD_WEBHOOK_URL" \
              || echo "::warning::Discord announce failed"
          else
            echo "DISCORD_WEBHOOK_URL not set - skipping Discord announce"
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" --data-urlencode text="$MSG" >/dev/null \
              || echo "::warning::Telegram announce failed"
          else
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set - skipping Telegram announce"
          fi
