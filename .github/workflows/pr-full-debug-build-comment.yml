name: PR Full Debug Build Comment

on:
  workflow_run:
    workflows: ["PR Full Debug Build"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  comment:
    name: Comment PR with debug build result
    runs-on: ubuntu-latest

    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            let pr = run.pull_requests?.[0];
            if (!pr && run.head_sha) {
              const associatedPulls = await github.paginate(github.rest.repos.listPullRequestsAssociatedWithCommit, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: run.head_sha,
                per_page: 100
              });
              pr = associatedPulls.find((item) => item.state === "open") || associatedPulls[0];
            }
            if (!pr && run.head_repository?.owner?.login && run.head_branch) {
              const head = `${run.head_repository.owner.login}:${run.head_branch}`;
              const branchPulls = await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                head,
                per_page: 100
              });
              pr = branchPulls.find((item) => item.head?.sha === run.head_sha) || branchPulls[0];
            }
            if (!pr) {
              core.info(`No pull request was associated with workflow run ${run.id} at ${run.head_sha}.`);
              return;
            }

            const marker = "<!-- nuvio-full-debug-build -->";
            const runUrl = run.html_url;
            const artifactName = `nuvio-full-debug-pr-${pr.number}`;
            let body;

            if (run.conclusion === "success") {
              const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100
              });
              const artifact = artifacts.find((item) => item.name === artifactName);
              const artifactUrl = artifact
                ? `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}/artifacts/${artifact.id}`
                : runUrl;

              body = [
                marker,
                "Full debug APK build completed successfully.",
                "",
                `Artifact: \`${artifactName}\``,
                `Download: ${artifactUrl}`,
                "",
                "GitHub downloads Actions artifacts as a zip. The zip contains the universal debug APK."
              ].join("\n");
            } else {
              body = [
                marker,
                "Full debug APK build failed.",
                "",
                `Logs: ${runUrl}`,
                "",
                "Open the failed workflow run and expand the failed step to see the Gradle error."
              ].join("\n");
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body
              });
            }
