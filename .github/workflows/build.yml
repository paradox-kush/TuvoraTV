name: Build APK

# Builds the Android TV debug APK on every push. The job FAILS if the build fails,
# and the APK is uploaded as a downloadable artifact ("nuviotv-full-debug").
# The debug build signs with the release config; CI generates a throwaway keystore
# using the passwords already defaulted in app/build.gradle.kts.
# Optional: set repo secrets SUPABASE_URL / SUPABASE_ANON_KEY to bake login into the CI APK.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v -keystore nuviotv.jks -alias nuviotv \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 815787 -keypass 815787 \
            -dname "CN=Nuvio CI, OU=CI, O=Nuvio, L=NA, S=NA, C=US"

      - name: Configure local.properties
        run: |
          {
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
          } >> local.properties

      - name: Raise Gradle heap for packaging
        run: echo "org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8" >> gradle.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleFullDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nuviotv-full-debug
          path: app/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error
